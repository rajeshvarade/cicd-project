# ============================================================
# CD PIPELINE — Deploy to Azure VM
# Triggers automatically after CI pipeline succeeds on main
# You must create the Azure VM manually first (Azure Portal)
# ============================================================
name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]   # ← name must match ci.yml "name:" exactly
    types:
      - completed
    branches:
      - main

jobs:

# ──────────────────────────────────────────────────────────────
# JOB 1: VERIFY VM + SSH CONNECTION
# Makes sure your Azure VM is reachable before deploying
# ──────────────────────────────────────────────────────────────
  verify-vm:
    name: Verify VM and SSH
    runs-on: self-hosted
    # Only run if the CI pipeline actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Test SSH connection to Azure VM
        run: |
          # Create the .ssh directory if it doesn't exist
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Save the private SSH key from GitHub Secret to a temp file
          echo "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/azure_vm_key
          chmod 600 ~/.ssh/azure_vm_key
          # chmod 600 = only the owner can read/write (SSH requirement)

          # Add VM to known_hosts to avoid "authenticity" prompt
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

          # Test connection — runs a simple command on the VM
          ssh -i ~/.ssh/azure_vm_key \
              -o ConnectTimeout=10 \
              ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} \
              "echo '✅ SSH connection successful' && whoami && uptime"



# ──────────────────────────────────────────────────────────────
# JOB 2: DEPLOY CONTAINER TO AZURE VM
# SSHes into your VM and pulls + runs the new Docker image
# ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Container
    runs-on: self-hosted
    needs: verify-vm

    steps:
      - name: Deploy to Azure VM via SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/azure_vm_key
          chmod 600 ~/.ssh/azure_vm_key
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

          # SSH into VM and run deployment commands
          ssh -i ~/.ssh/azure_vm_key \
              ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'DEPLOY_SCRIPT'

            echo "🚀 Starting deployment..."

            # Step 1: Login to DockerHub on the VM
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            # Note: These env vars are passed in the ssh command below

            # Step 2: Pull the latest image
            docker pull $DOCKERHUB_USERNAME/myapp:latest
            echo "✅ Image pulled from DockerHub"

            # Step 3: Stop and remove the old running container (if it exists)
            docker stop cicd-app 2>/dev/null || true
            docker rm   cicd-app 2>/dev/null || true
            # 2>/dev/null suppresses the "container not found" error on first deploy

            # Step 4: Run the new container
            docker run -d \
              --name cicd-app \
              --restart always \
              -p 80:80 \
              $DOCKERHUB_USERNAME/myapp:latest
            # --restart always = auto-starts if VM reboots

            echo "✅ New container started"

            # Step 5: Logout from DockerHub on VM
            docker logout

          DEPLOY_SCRIPT
        env:
          # Pass DockerHub credentials as environment variables into the SSH session
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

# ──────────────────────────────────────────────────────────────
# JOB 3: HEALTH CHECK
# Verifies your app is live and responding after deployment
# ──────────────────────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: self-hosted
    needs: deploy

    steps:
      - name: Wait for app to start
        run: sleep 15
        # Give the new container 15 seconds to fully initialise

      - name: Check app is live
        run: |
          # Try to reach your app's public URL
          # Replace with your actual Azure VM public IP or domain
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.AZURE_VM_HOST }})

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ App is healthy and responding!"
          else
            echo "❌ Health check failed! Status: $HTTP_STATUS"
            exit 1
          fi

      - name: Check container is running on VM
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/azure_vm_key
          chmod 600 ~/.ssh/azure_vm_key
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/azure_vm_key \
              ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} \
              "docker ps --filter name=cicd-app --format 'Container: {{.Names}} | Status: {{.Status}}'"



# ──────────────────────────────────────────────────────────────
# JOB 4: NOTIFY SUCCESS OR FAILURE
# Sends a notification when deployment finishes (pass or fail)
# Using GitHub's built-in notification (no extra tool needed)
# ──────────────────────────────────────────────────────────────
  notify:
    name: Notify Result
    runs-on: self-hosted
    needs: [ deploy, health-check ]
    if: always()                 # ← always runs, even if deploy failed

    steps:
      - name: Notify success
        if: ${{ needs.health-check.result == 'success' }}
        run: |
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "App is live at: http://${{ secrets.AZURE_VM_HOST }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          # To send Slack/email notifications, add a step here using
          # webhooks or the slackapi/slack-github-action@v1 action

      - name: Notify failure
        if: ${{ needs.health-check.result != 'success' }}
        run: |
          echo "❌ DEPLOYMENT FAILED"
          echo "Check the logs above to find which step failed"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          exit 1
          # Exiting with 1 marks the whole workflow as failed in GitHub UI

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/azure_vm_key
        # Always delete the private key from disk after use
