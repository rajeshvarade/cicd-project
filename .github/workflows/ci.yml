# ============================================================
# CI PIPELINE — Validate → Build → Test → Security Scan
# Runs on every push to main and every Pull Request
# ============================================================
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Which runner to use — "self-hosted" means YOUR private runner
jobs:

# ──────────────────────────────────────────────────────────────
# JOB 1: VALIDATE CODE
# Checks HTML syntax so broken code never reaches Docker build
# ──────────────────────────────────────────────────────────────
  validate:
    name: Validate Code
    runs-on: self-hosted          # ← your private runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # This downloads your repo onto the runner machine

      - name: Install HTML validator
        run: |
          npm install html-validate
          # html-validate is a CLI tool that checks HTML files for errors

      - name: Validate HTML file
        run: |
          npx html-validate "*.html"
          echo "✅ HTML validation passed"
# ──────────────────────────────────────────────────────────────
# JOB 2: BUILD DOCKER IMAGE
# Creates a Docker image from your HTML project
# Only runs if validate job passes
# ──────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: self-hosted
    needs: validate              # ← waits for validate to succeed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          # Use the short Git commit hash as the image version tag
          # e.g. myapp:version01
          echo "IMAGE_TAG=version01" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/myapp:${{ steps.vars.outputs.IMAGE_TAG }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest \
            .
          # -t = tag name   . = build from current directory (uses Dockerfile)
          echo "✅ Docker image built: ${{ steps.vars.outputs.IMAGE_TAG }}"

      # Save the tag so the next jobs can use it
      - name: Export image tag
        run: echo "${{ steps.vars.outputs.IMAGE_TAG }}" > image_tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image_tag.txt

# ──────────────────────────────────────────────────────────────
# JOB 3: RUN CONTAINER TEST
# Starts your container and checks it actually works
# ──────────────────────────────────────────────────────────────
  test:
    name: Container Test
    runs-on: self-hosted
    needs: build

    steps:
      - name: Download image tag
        uses: actions/download-artifact@v4
        with:
          name: image-tag

      - name: Load image tag
        id: tag
        run: echo "IMAGE_TAG=$(cat image_tag.txt)" >> $GITHUB_OUTPUT

      - name: Run container
        run: |
          # Start container in background (-d), map port 8080 on host to 80 in container
          docker run -d \
            --name test-container \
            -p 8080:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Wait for container to be ready
        run: sleep 5
        # Give the container a few seconds to fully start

      - name: Test container responds
        run: |
          # curl fetches the page; -f makes it fail if HTTP error code returned
          curl -f http://localhost:8080 || exit 1
          echo "✅ Container responded successfully"

      - name: Cleanup test container
        if: always()             # ← runs even if the test above failed
        run: |
          docker stop test-container || true
          docker rm test-container  || true
